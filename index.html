<div class="panel">

<h2>🎯 二维码生成器</h2>
<p class="desc">生成高质量、可自定义样式的二维码</p>

<!-- 内容 -->
<div class="section">
<h3>内容</h3>
<input id="text" placeholder="输入网址或文本">
</div>

<!-- 样式 -->
<div class="section">
<h3>外观</h3>

<label>点样式</label>
<select id="dots">
  <option value="square">方块</option>
  <option value="dots">圆点</option>
  <option value="rounded">圆角</option>
  <option value="classy">优雅</option>
</select>

<label>渐变类型</label>
<select id="gradientType">
  <option value="linear">线性渐变</option>
  <option value="radial">径向渐变</option>
</select>

<div class="color-group">
<input type="color" id="color1">
<input type="color" id="color2">
</div>

</div>

<!-- Logo -->
<div class="section">
<h3>Logo</h3>
<input type="file" id="logo">
<label>大小</label>
<input type="range" id="logoSize" min="0" max="0.4" step="0.05">
</div>

<!-- 高级 -->
<details class="section">
<summary>高级设置</summary>

<label>尺寸</label>
<input type="range" id="size" min="100" max="800" value="300">

<label>纠错等级</label>
<select id="ec">
<option value="L">低</option>
<option value="M">中</option>
<option value="Q">高</option>
<option value="H">最高（推荐）</option>
</select>

<label>背景颜色</label>
<input type="color" id="bg">

</details>

<button onclick="downloadPNG()">⬇ 下载 PNG</button>
<button onclick="downloadSVG()">⬇ 下载 SVG</button>

</div>
