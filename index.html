<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成器 Pro</title>
<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #08090d;
  --surface: #111318;
  --surface2: #191c24;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.15);
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);
  --text: #f0f0f0;
  --muted: #5a5f72;
  --muted2: #8890a8;
  --preview-size: 280px;
  --radius: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.logo-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent);
}

.header-input-wrap {
  flex: 1;
  max-width: 500px;
  position: relative;
}

.header-input-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

#text {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
  outline: none;
}

#text:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,255,0,0.08);
}

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 220px 1fr 220px;
  gap: 0;
  min-height: calc(100vh - 61px);
}

/* ── SIDEBAR ── */
.sidebar {
  padding: 20px 16px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }

.sidebar-right {
  border-right: none;
  border-left: 1px solid var(--border);
}

.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 4px 4px;
}

.field { margin-bottom: 2px; }

label.field-label {
  display: block;
  font-size: 11px;
  color: var(--muted2);
  margin-bottom: 4px;
}

select, input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
  cursor: pointer;
  appearance: none;
}

select:hover, input[type="number"]:hover {
  border-color: var(--border-hover);
}

select:focus, input[type="number"]:focus {
  border-color: var(--accent);
}

/* Color row */
.color-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.color-swatch {
  flex: 1;
  position: relative;
  height: 34px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
}

.color-swatch:hover { border-color: var(--border-hover); }

.color-swatch input[type="color"] {
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  border: none;
  padding: 0;
  cursor: pointer;
  background: none;
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

/* Logo upload */
.upload-area {
  border: 1px dashed var(--border-hover);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.upload-area:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.upload-area input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-label { font-size: 11px; color: var(--muted2); pointer-events: none; }
.upload-label strong { display: block; color: var(--text); margin-bottom: 2px; font-size: 12px; }

/* Range slider */
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 4px;
  border: none;
  outline: none;
  padding: 0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 8px rgba(200,255,0,0.4);
}

/* ── CENTER / PREVIEW ── */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  gap: 24px;
  background: radial-gradient(ellipse at center, rgba(200,255,0,0.03) 0%, transparent 70%);
}

.qr-stage {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#qr-wrapper {
  background: #fff;
  padding: 16px;
  border-radius: 20px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.1),
    0 20px 60px rgba(0,0,0,0.6),
    0 0 80px rgba(200,255,0,0.04);
  line-height: 0;
  transition: box-shadow 0.3s;
}

#qr-wrapper:hover {
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.15),
    0 25px 70px rgba(0,0,0,0.7),
    0 0 100px rgba(200,255,0,0.08);
}

.qr-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--muted2);
}

.qr-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
}

.qr-badge span {
  color: var(--accent);
}

/* Templates center row */
.templates-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  width: 100%;
  max-width: 360px;
}

.tpl-btn {
  aspect-ratio: 1;
  border: 2px solid transparent;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}

.tpl-btn:hover {
  transform: scale(1.08);
  border-color: rgba(255,255,255,0.4);
}

.tpl-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(200,255,0,0.3);
}

.tpl-btn span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 3px;
  font-size: 8px;
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  background: linear-gradient(transparent 40%, rgba(0,0,0,0.4));
}

/* ── RIGHT SIDEBAR: actions + advanced ── */
.export-block { display: flex; flex-direction: column; gap: 8px; }

.size-display {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.size-px {
  display: flex;
  align-items: center;
  gap: 6px;
}

.size-px input[type="number"] {
  flex: 1;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--text);
  border-color: transparent;
  background: transparent;
  padding: 0;
  text-align: left;
}

.size-unit {
  font-size: 12px;
  color: var(--muted2);
}

.size-cm {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.02em;
}

.size-cm-label {
  font-size: 10px;
  color: var(--muted);
}

.btn-dl {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.btn-dl-png {
  background: var(--accent);
  color: #08090d;
}

.btn-dl-png:hover {
  background: #d9ff33;
  box-shadow: 0 4px 20px rgba(200,255,0,0.35);
  transform: translateY(-1px);
}

.btn-dl-svg {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-dl-svg:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
}

.btn-refresh {
  background: none;
  border: 1px dashed var(--border-hover);
  color: var(--muted2);
  border-radius: 8px;
  padding: 8px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-refresh:hover { color: var(--text); border-color: var(--border-hover); }

/* EC badge row */
.ec-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

.ec-btn {
  padding: 6px 4px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted2);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.ec-btn:hover { border-color: var(--border-hover); color: var(--text); }
.ec-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Transparent toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}

.toggle-label { font-size: 11px; color: var(--muted2); }

.toggle {
  width: 34px;
  height: 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
}

.toggle.on { background: var(--accent); border-color: var(--accent); }

.toggle::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--muted2);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: all 0.2s;
}

.toggle.on::after {
  left: 18px;
  background: #08090d;
}

/* ══════════════════════════════════════
   RESPONSIVE — Tablet
═══════════════════════════════════════ */
@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }

  .sidebar, .sidebar-right {
    border: none;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px 16px;
    padding: 16px;
    align-items: start;
  }

  .section-label { grid-column: 1 / -1; }
  .divider { grid-column: 1 / -1; }

  .center { padding: 30px 16px; min-height: 500px; }

  .templates-row { grid-template-columns: repeat(5, 1fr); max-width: 100%; }
}

/* ══════════════════════════════════════
   RESPONSIVE — Mobile
═══════════════════════════════════════ */
@media (max-width: 580px) {
  header { padding: 14px 16px; flex-wrap: wrap; }
  .logo { font-size: 15px; }
  .header-input-wrap { width: 100%; max-width: 100%; order: 3; flex: none; }

  .sidebar, .sidebar-right {
    grid-template-columns: 1fr 1fr;
  }

  .templates-row { grid-template-columns: repeat(5, 1fr); }

  .color-row { flex-direction: row; }

  :root { --preview-size: 220px; }
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    QR Pro
  </div>
  <div class="header-input-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    <input id="text" type="text" value="https://example.com" placeholder="输入网址或文本内容…" autocomplete="off">
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- LEFT: Style controls -->
  <aside class="sidebar">
    <div class="section-label">样式定制</div>

    <div class="field">
      <label class="field-label">点样式</label>
      <select id="dots">
        <option value="square">方块</option>
        <option value="dots">圆点</option>
        <option value="rounded">圆角</option>
        <option value="classy">优雅</option>
        <option value="classy-rounded">优雅圆角</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">渐变类型</label>
      <select id="gradientType">
        <option value="linear">线性渐变</option>
        <option value="radial">径向渐变</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">渐变颜色</label>
      <div class="color-row">
        <div class="color-swatch" title="起始色">
          <input type="color" id="color1" value="#7F00FF">
        </div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5a5f72" stroke-width="2" style="flex-shrink:0"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <div class="color-swatch" title="结束色">
          <input type="color" id="color2" value="#E100FF">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label class="field-label">角标样式</label>
      <select id="corner">
        <option value="square">方形</option>
        <option value="extra-rounded">圆角</option>
        <option value="dot">点状</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">角点样式</label>
      <select id="cornerDot">
        <option value="square">方块</option>
        <option value="dot">圆点</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label class="field-label">背景颜色</label>
      <div class="color-row">
        <div class="color-swatch">
          <input type="color" id="bg" value="#ffffff">
        </div>
        <span style="font-size:11px;color:var(--muted2);">背景色</span>
      </div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">透明背景</span>
      <div class="toggle" id="transparentToggle" onclick="this.classList.toggle('on'); updateQR()"></div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Logo 嵌入</div>

    <div class="upload-area">
      <input type="file" id="logo" accept="image/*">
      <div class="upload-label">
        <strong>点击上传 Logo</strong>
        PNG / SVG / JPG
      </div>
    </div>

    <div class="field" style="margin-top:4px;">
      <label class="field-label">Logo 大小 &nbsp;<span id="logoSizeVal" style="color:var(--accent);">20%</span></label>
      <input type="range" id="logoSize" min="0" max="0.4" step="0.05" value="0.2">
    </div>
  </aside>

  <!-- CENTER: QR Preview + Templates -->
  <main class="center">
    <div class="qr-stage">
      <div id="qr-wrapper">
        <div id="qr"></div>
      </div>

      <div class="qr-meta">
        <div class="qr-badge">预览 <span>固定尺寸</span></div>
        <span>↑ 实时渲染</span>
        <div class="qr-badge">EC: <span id="ecLabel">H</span></div>
      </div>
    </div>

    <!-- Templates -->
    <div class="templates-row" id="tplRow"></div>
  </main>

  <!-- RIGHT: Export + Advanced -->
  <aside class="sidebar sidebar-right">
    <div class="section-label">导出文件</div>

    <div class="export-block">
      <div class="size-display">
        <label class="field-label" style="margin:0;">导出尺寸</label>
        <div class="size-px">
          <input type="number" id="size" value="600" step="50" min="100" max="2000" style="font-size:22px;font-weight:800;">
          <span class="size-unit">px</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:6px;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;">
          <div class="size-cm" id="sizeCm">—</div>
          <div class="size-cm-label">厘米 (96 dpi)</div>
        </div>
        <div style="display:flex;align-items:baseline;gap:6px;">
          <div class="size-cm" id="sizeCm300" style="font-size:16px;color:var(--muted2);">—</div>
          <div class="size-cm-label">厘米 (300 dpi 印刷)</div>
        </div>
      </div>

      <button class="btn-dl btn-dl-png" onclick="downloadPNG()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 PNG
      </button>

      <button class="btn-dl btn-dl-svg" onclick="downloadSVG()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
        下载 SVG 矢量
      </button>

      <button class="btn-refresh" onclick="updateQR()">↺ 强制刷新预览</button>
    </div>

    <div class="divider" style="grid-column:1/-1;"></div>

    <div class="section-label">纠错等级</div>

    <div class="ec-row">
      <button class="ec-btn" data-ec="L" onclick="setEC('L')">L<br><span style="font-weight:400;opacity:.7">低</span></button>
      <button class="ec-btn" data-ec="M" onclick="setEC('M')">M<br><span style="font-weight:400;opacity:.7">中</span></button>
      <button class="ec-btn" data-ec="Q" onclick="setEC('Q')">Q<br><span style="font-weight:400;opacity:.7">高</span></button>
      <button class="ec-btn active" data-ec="H" onclick="setEC('H')">H<br><span style="font-weight:400;opacity:.7">最高</span></button>
    </div>

  </aside>
</div>

<script>
// ── QR init (FIXED preview size, always 280px) ──
const PREVIEW_PX = 280;

let qr = new QRCodeStyling({ width: PREVIEW_PX, height: PREVIEW_PX, data: "https://example.com" });
qr.append(document.getElementById("qr"));

// ── CM conversion ──
function updateCm() {
  const px = parseInt(document.getElementById("size").value) || 600;
  const cm96  = (px / 96  * 2.54).toFixed(2);
  const cm300 = (px / 300 * 2.54).toFixed(2);
  document.getElementById("sizeCm").textContent    = cm96  + " cm";
  document.getElementById("sizeCm300").textContent = cm300 + " cm";
}

// ── Templates ──
const templates = {
  "经典": { dots:"square",  gType:"linear",  c1:"#000000", c2:"#000000", corner:"square",        cornerDot:"square", bg:"#ffffff", grad:"#000,#000" },
  "紫焰": { dots:"rounded", gType:"linear",  c1:"#7F00FF", c2:"E100FF",  corner:"extra-rounded", cornerDot:"dot",    bg:"#ffffff", grad:"#7F00FF,#E100FF" },
  "翠绿": { dots:"dots",    gType:"radial",  c1:"#00c853", c2:"#b2ff59", corner:"dot",           cornerDot:"dot",    bg:"#ffffff", grad:"#00c853,#b2ff59" },
  "烈金": { dots:"classy",  gType:"linear",  c1:"#d4af37", c2:"#ffd700", corner:"extra-rounded", cornerDot:"square", bg:"#000000", grad:"#d4af37,#ffd700" },
  "极蓝": { dots:"rounded", gType:"linear",  c1:"#00c6ff", c2:"#0072ff", corner:"extra-rounded", cornerDot:"dot",    bg:"#ffffff", grad:"#00c6ff,#0072ff" },
  "钢灰": { dots:"square",  gType:"linear",  c1:"#444444", c2:"#999999", corner:"square",        cornerDot:"square", bg:"#ffffff", grad:"#444,#999" },
  "热红": { dots:"dots",    gType:"radial",  c1:"#ff1744", c2:"#ff8a80", corner:"dot",           cornerDot:"dot",    bg:"#ffffff", grad:"#ff1744,#ff8a80" },
  "海洋": { dots:"rounded", gType:"linear",  c1:"#00f2fe", c2:"#4facfe", corner:"extra-rounded", cornerDot:"dot",    bg:"#ffffff", grad:"#00f2fe,#4facfe" },
  "霓虹": { dots:"classy",  gType:"linear",  c1:"#00ffff", c2:"#ff00ff", corner:"extra-rounded", cornerDot:"dot",    bg:"#000000", grad:"#00ffff,#ff00ff" },
  "糖果": { dots:"dots",    gType:"radial",  c1:"#ff9a9e", c2:"#fad0c4", corner:"dot",           cornerDot:"dot",    bg:"#ffffff", grad:"#ff9a9e,#fad0c4" },
};

// Build template buttons
const tplRow = document.getElementById("tplRow");
Object.entries(templates).forEach(([name, t]) => {
  const btn = document.createElement("button");
  btn.className = "tpl-btn";
  btn.style.background = `linear-gradient(135deg, ${t.grad})`;
  btn.dataset.name = name;
  btn.innerHTML = `<span>${name}</span>`;
  btn.onclick = () => {
    document.querySelectorAll(".tpl-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyTemplate(t);
  };
  tplRow.appendChild(btn);
});

function applyTemplate(t) {
  document.getElementById("dots").value        = t.dots;
  document.getElementById("gradientType").value = t.gType;
  document.getElementById("color1").value      = t.c1;
  document.getElementById("color2").value      = t.c2;
  document.getElementById("corner").value      = t.corner;
  document.getElementById("cornerDot").value   = t.cornerDot;
  document.getElementById("bg").value          = t.bg;
  updateQR();
}

// ── EC ──
let currentEC = "H";
function setEC(val) {
  currentEC = val;
  document.querySelectorAll(".ec-btn").forEach(b => b.classList.toggle("active", b.dataset.ec === val));
  document.getElementById("ecLabel").textContent = val;
  updateQR();
}

// ── Logo size label ──
document.getElementById("logoSize").addEventListener("input", function() {
  document.getElementById("logoSizeVal").textContent = Math.round(this.value * 100) + "%";
  updateQR();
});

// ── Main update (preview always 280px) ──
function updateQR() {
  const text       = document.getElementById("text").value || " ";
  const dots       = document.getElementById("dots").value;
  const gradType   = document.getElementById("gradientType").value;
  const c1         = document.getElementById("color1").value;
  const c2         = document.getElementById("color2").value;
  const corner     = document.getElementById("corner").value;
  const cornerDot  = document.getElementById("cornerDot").value;
  const bg         = document.getElementById("bg").value;
  const isTransparent = document.getElementById("transparentToggle").classList.contains("on");
  const logoInput  = document.getElementById("logo");
  const logoSize   = parseFloat(document.getElementById("logoSize").value);

  let logoURL = "";
  if (logoInput.files.length > 0) {
    logoURL = URL.createObjectURL(logoInput.files[0]);
  }

  // Preview always renders at fixed PREVIEW_PX
  qr.update({
    width: PREVIEW_PX, height: PREVIEW_PX,
    data: text,
    qrOptions: { errorCorrectionLevel: currentEC },
    image: logoURL,
    imageOptions: { imageSize: logoSize, hideBackgroundDots: true },
    dotsOptions: {
      type: dots,
      gradient: { type: gradType, colorStops: [{offset:0,color:c1},{offset:1,color:c2}] }
    },
    cornersSquareOptions: { type: corner },
    cornersDotOptions:    { type: cornerDot },
    backgroundOptions:    { color: isTransparent ? "transparent" : bg }
  });

  updateCm();
}

// ── Download (uses export size from #size input) ──
function getExportConfig() {
  const text      = document.getElementById("text").value || " ";
  const dots      = document.getElementById("dots").value;
  const gradType  = document.getElementById("gradientType").value;
  const c1        = document.getElementById("color1").value;
  const c2        = document.getElementById("color2").value;
  const corner    = document.getElementById("corner").value;
  const cornerDot = document.getElementById("cornerDot").value;
  const bg        = document.getElementById("bg").value;
  const isTransparent = document.getElementById("transparentToggle").classList.contains("on");
  const size      = parseInt(document.getElementById("size").value) || 600;
  const logoInput = document.getElementById("logo");
  const logoSize  = parseFloat(document.getElementById("logoSize").value);

  let logoURL = "";
  if (logoInput.files.length > 0) {
    logoURL = URL.createObjectURL(logoInput.files[0]);
  }

  return new QRCodeStyling({
    width: size, height: size,
    data: text,
    qrOptions: { errorCorrectionLevel: currentEC },
    image: logoURL,
    imageOptions: { imageSize: logoSize, hideBackgroundDots: true },
    dotsOptions: {
      type: dots,
      gradient: { type: gradType, colorStops: [{offset:0,color:c1},{offset:1,color:c2}] }
    },
    cornersSquareOptions: { type: corner },
    cornersDotOptions:    { type: cornerDot },
    backgroundOptions:    { color: isTransparent ? "transparent" : bg }
  });
}

function downloadPNG() {
  getExportConfig().download({ name: "qrcode_pro", extension: "png" });
}

function downloadSVG() {
  getExportConfig().download({ name: "qrcode_pro", extension: "svg" });
}

// ── Event listeners ──
document.getElementById("text").addEventListener("input", updateQR);
document.getElementById("dots").addEventListener("change", updateQR);
document.getElementById("gradientType").addEventListener("change", updateQR);
document.getElementById("color1").addEventListener("input", updateQR);
document.getElementById("color2").addEventListener("input", updateQR);
document.getElementById("corner").addEventListener("change", updateQR);
document.getElementById("cornerDot").addEventListener("change", updateQR);
document.getElementById("bg").addEventListener("input", updateQR);
document.getElementById("logo").addEventListener("change", updateQR);
document.getElementById("size").addEventListener("input", updateCm);

// ── Init ──
updateCm();
updateQR();
// Activate first template btn visually
tplRow.children[1]?.classList.add("active"); // "紫焰" default
</script>
</body>
</html>
