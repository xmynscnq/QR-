<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>二维码生成器 Pro（高级版）</title>

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0f172a;
  color:#fff;
}
.container {
  display:flex;
  height:100vh;
}
.panel {
  width:360px;
  background:#111827;
  padding:20px;
  overflow:auto;
}
.preview {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.section {
  margin-bottom:20px;
}
h2 {margin-bottom:10px;}
h3 {
  font-size:14px;
  color:#9ca3af;
  margin-bottom:6px;
}
.desc {
  font-size:12px;
  color:#6b7280;
  margin-bottom:8px;
}
input, select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:#fff;
}
input[type="color"] {height:40px;}
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:linear-gradient(45deg,#7F00FF,#E100FF);
  color:#fff;
  cursor:pointer;
}
.template-btn {
  width:48%;
  margin:2px;
  padding:8px;
  font-size:12px;
}
details summary {
  cursor:pointer;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="panel">

<h2>🚀 二维码生成器</h2>
<p class="desc">支持高级样式、自定义设计、Logo嵌入</p>

<!-- 内容 -->
<div class="section">
<h3>内容</h3>
<p class="desc">扫码后打开的内容（网址 / 文本）</p>
<input id="text" value="https://example.com">
</div>

<!-- 模板 -->
<div class="section">
<h3>快速模板</h3>
<button onclick="preset('classic')" 
style="background:#000;color:#fff;">经典黑白</button>

<button onclick="preset('purple')" 
style="background:linear-gradient(45deg,#7F00FF,#E100FF);">
炫酷紫</button>

<button onclick="preset('green')" 
style="background:linear-gradient(45deg,#00c853,#b2ff59);color:#000;">
清新绿</button>

<button onclick="preset('gold')" 
style="background:linear-gradient(45deg,#d4af37,#ffd700);color:#000;">
高级金</button>

<button onclick="preset('blue')" 
style="background:linear-gradient(45deg,#00c6ff,#0072ff);">
科技蓝</button>

<button onclick="preset('gray')" 
style="background:linear-gradient(45deg,#444,#999);">
极简灰</button>

<button onclick="preset('red')" 
style="background:linear-gradient(45deg,#ff1744,#ff8a80);">
热力红</button>

<button onclick="preset('ocean')" 
style="background:linear-gradient(45deg,#00f2fe,#4facfe);">
海洋蓝绿</button>

<button onclick="preset('neon')" 
style="background:linear-gradient(45deg,#00ffff,#ff00ff);color:#000;">
夜间霓虹</button>

<button onclick="preset('candy')" 
style="background:linear-gradient(45deg,#ff9a9e,#fad0c4);color:#000;">
糖果色</button>
</div>

<!-- 外观 -->
<div class="section">
<h3>外观设计</h3>

<label>点样式</label>
<select id="dots">
<option value="square">方块</option>
<option value="dots">圆点</option>
<option value="rounded">圆角</option>
<option value="classy">优雅</option>
</select>

<label>渐变类型</label>
<select id="gradientType">
<option value="linear">线性渐变</option>
<option value="radial">径向渐变</option>
</select>

<input type="color" id="color1" value="#7F00FF">
<input type="color" id="color2" value="#E100FF">

<label>角标样式</label>
<select id="corner">
<option value="square">方形</option>
<option value="extra-rounded">圆角</option>
<option value="dot">点状</option>
</select>

<label>角点样式</label>
<select id="cornerDot">
<option value="dot">圆点</option>
<option value="square">方块</option>
</select>

</div>

<!-- Logo -->
<div class="section">
<h3>Logo</h3>
<p class="desc">中间嵌入图片（建议简单图标）</p>
<input type="file" id="logo">
<label>大小（0~0.4）</label>
<input type="range" id="logoSize" min="0" max="0.4" step="0.05" value="0.2">
</div>

<!-- 高级 -->
<details class="section">
<summary>⚙ 高级设置</summary>

<label>尺寸</label>
<input type="range" id="size" min="100" max="1000" value="300">

<label>纠错等级</label>
<select id="ec">
<option value="L">低</option>
<option value="M">中</option>
<option value="Q">高</option>
<option value="H" selected>最高（推荐）</option>
</select>

<label>背景颜色</label>
<input type="color" id="bg" value="#ffffff">

<label>透明背景</label>
<select id="transparent">
<option value="no">否</option>
<option value="yes">是</option>
</select>

</details>

<button onclick="downloadPNG()">下载 PNG</button>
<button onclick="downloadSVG()">下载 SVG</button>

</div>

<div class="preview">
<div id="qr"></div>
</div>

</div>

<script>

let qr = new QRCodeStyling({
  width:300,
  height:300,
  data:"https://example.com"
});

qr.append(document.getElementById("qr"));

const templates = {

  classic:{
    dots:"square",
    gradientType:"linear",
    color1:"#000000",
    color2:"#000000",
    corner:"square",
    cornerDot:"square",
    bg:"#ffffff"
  },

  purple:{
    dots:"rounded",
    gradientType:"linear",
    color1:"#7F00FF",
    color2:"#E100FF",
    corner:"extra-rounded",
    cornerDot:"dot",
    bg:"#ffffff"
  },

  green:{
    dots:"dots",
    gradientType:"radial",
    color1:"#00c853",
    color2:"#b2ff59",
    corner:"dot",
    cornerDot:"dot",
    bg:"#ffffff"
  },

  gold:{
    dots:"classy",
    gradientType:"linear",
    color1:"#d4af37",
    color2:"#ffd700",
    corner:"extra-rounded",
    cornerDot:"square",
    bg:"#000000"
  },

  blue:{
    dots:"rounded",
    gradientType:"linear",
    color1:"#00c6ff",
    color2:"#0072ff",
    corner:"extra-rounded",
    cornerDot:"dot",
    bg:"#ffffff"
  },

  gray:{
    dots:"square",
    gradientType:"linear",
    color1:"#444",
    color2:"#999",
    corner:"square",
    cornerDot:"square",
    bg:"#ffffff"
  },

  red:{
    dots:"dots",
    gradientType:"radial",
    color1:"#ff1744",
    color2:"#ff8a80",
    corner:"dot",
    cornerDot:"dot",
    bg:"#ffffff"
  },

  ocean:{
    dots:"rounded",
    gradientType:"linear",
    color1:"#00f2fe",
    color2:"#4facfe",
    corner:"extra-rounded",
    cornerDot:"dot",
    bg:"#ffffff"
  },

  neon:{
    dots:"classy",
    gradientType:"linear",
    color1:"#00ffff",
    color2:"#ff00ff",
    corner:"extra-rounded",
    cornerDot:"dot",
    bg:"#000000"
  },

  candy:{
    dots:"dots",
    gradientType:"radial",
    color1:"#ff9a9e",
    color2:"#fad0c4",
    corner:"dot",
    cornerDot:"dot",
    bg:"#ffffff"
  }

};

function updateQR(){

  const text = document.getElementById("text").value;
  const size = +document.getElementById("size").value;
  const ec = document.getElementById("ec").value;
  const dots = document.getElementById("dots").value;
  const gradientType = document.getElementById("gradientType").value;
  const color1 = document.getElementById("color1").value;
  const color2 = document.getElementById("color2").value;
  const corner = document.getElementById("corner").value;
  const cornerDot = document.getElementById("cornerDot").value;
  const bg = document.getElementById("bg").value;
  const transparent = document.getElementById("transparent").value;
  const logoInput = document.getElementById("logo");
  const logoSize = parseFloat(document.getElementById("logoSize").value);

  let logoURL = "";
  if (logoInput.files.length > 0) {
    logoURL = URL.createObjectURL(logoInput.files[0]);
  }

  qr.update({
    width:size,
    height:size,
    data:text,
    qrOptions:{ errorCorrectionLevel:ec },

    image:logoURL,
    imageOptions:{
      imageSize:logoSize,
      hideBackgroundDots:true
    },

    dotsOptions:{
      type:dots,
      gradient:{
        type:gradientType,
        colorStops:[
          {offset:0,color:color1},
          {offset:1,color:color2}
        ]
      }
    },

    cornersSquareOptions:{ type:corner },
    cornersDotOptions:{ type:cornerDot },

    backgroundOptions:{
      color: transparent==="yes" ? "transparent" : bg
    }
  });
}

// ⭐ 完整模板切换（核心）
function preset(type){

  const t = templates[type];

  document.getElementById("dots").value = t.dots;
  document.getElementById("gradientType").value = t.gradientType;
  document.getElementById("color1").value = t.color1;
  document.getElementById("color2").value = t.color2;
  document.getElementById("corner").value = t.corner;
  document.getElementById("cornerDot").value = t.cornerDot;
  document.getElementById("bg").value = t.bg;

  updateQR();
}

// 自动更新
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input",updateQR);
});

function downloadPNG(){
  qr.download({name:"qr",extension:"png"});
}
function downloadSVG(){
  qr.download({name:"qr",extension:"svg"});
}

</script>

</body>
</html>
